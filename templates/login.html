{% extends "base.html" %}

{% block content %}
<div
    class="max-w-md mx-auto mt-12 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden flex flex-col justify-center">
    <div class="p-8">
        <div class="text-center mb-8">
            <div class="mx-auto bg-brand-primary/10 h-16 w-16 rounded-full flex items-center justify-center mb-4">
                <i class="fa-solid fa-lock text-2xl text-brand-primary"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-brand-dark mb-1">System Login</h1>
            <p class="text-gray-500 text-sm">Secure access to inventory & sales</p>
        </div>

        <form method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input id="username" name="username" type="text" required
                        class="pl-10 appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand-primary focus:border-brand-primary sm:text-sm transition-colors">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-key text-gray-400"></i>
                    </div>
                    <input id="password" name="password" type="password" required
                        class="pl-10 appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand-primary focus:border-brand-primary sm:text-sm transition-colors">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit"
                    class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-brand-primary hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary transition-all">
                    Sign in to Account
                </button>
            </div>
        </form>
        <div class="mt-8 pt-6 border-t border-gray-100 flex justify-between text-xs text-gray-400">
            <div class="text-center w-1/2 border-r border-gray-100">
                <span class="block font-semibold text-gray-500 mb-1"></span>
                <br>
            </div>
            <div class="text-center w-1/2">
                <span class="block font-semibold text-gray-500 mb-1"></span>
                <br>
            </div>
        </div>
    </div>
</div>
{% endblock %}
